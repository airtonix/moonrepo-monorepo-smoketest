name = "{{ serviceName }}"
main = "src/index.ts"
compatibility_date = "2026-03-07"
workers_dev = true

[vars]
SERVICE_NAME = "{{ serviceName }}"
DEPLOY_ENV = "preview"

[env.preview]
workers_dev = true
[env.preview.vars]
SERVICE_NAME = "{{ serviceName }}"
DEPLOY_ENV = "preview"

[env.staging]
workers_dev = true
[env.staging.vars]
SERVICE_NAME = "{{ serviceName }}"
DEPLOY_ENV = "staging"

[env.production]
workers_dev = true
[env.production.vars]
SERVICE_NAME = "{{ serviceName }}"
DEPLOY_ENV = "production"
