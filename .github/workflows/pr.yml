name: Pr

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: write
  pull-requests: write
  issues: write

jobs:
  Check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # We need full history for branch-aware tooling (moon affected/diff behavior).
      # Shallow checkout can break base-branch comparisons in CI.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Toolchain
        uses: moonrepo/setup-toolchain@8794f0318b9df4a43a5ddc23cefd16f595b423dd # v0
        with:
          auto-install: true
          auto-setup: true

      # Monorepo quality gate for pull requests.
      - name: Run Checks
        run: |
          moon run :lint
          moon run :test
          moon run :build
