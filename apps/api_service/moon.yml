$schema: "https://moonrepo.dev/schemas/project.json"

language: typescript
layer: application

toolchains:
  default: ["javascript", "bun"]

tasks:
  build:
    command: ".moon/task/build.sh"
    outputs:
      - ".artifacts/worker"
    options:
      cache: false

  package:
    deps:
      - "~:build"
    command: ".moon/task/package.sh"
    outputs:
      - ".artifacts"
    options:
      cache: false

  publish:
    deps:
      - "~:package"
    script: |
      set -euo pipefail
      echo "api-service publish skeleton"
      echo "args: $*"
      echo "arg1: ${1:-}"
      echo "arg2: ${2:-}"
      echo "arg3: ${3:-}"
      echo "PUBLISH_TARGET: ${PUBLISH_TARGET:-}"
      echo "PUBLISH_TAG: ${PUBLISH_TAG:-}"
      echo "DEPLOY_ENV: ${DEPLOY_ENV:-}"
    outputs:
      - ".artifacts"
    options:
      cache: false
